spring:
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false
      discovery:
        enabled: false
    service-registry:
      auto-registration:
        enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  test:
    database:
      replace: none

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
