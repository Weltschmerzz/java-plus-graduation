server:
  port: 0

spring:
  application:
    name: event-service
---
spring:
  config:
    activate:
      on-profile: "!test"
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
