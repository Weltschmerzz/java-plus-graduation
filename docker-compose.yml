services:
  discovery-server:
    build:
      context: .
      dockerfile: infra/discovery-server/Dockerfile
    ports:
      - "8761:8761"

  config-server:
    build:
      context: .
      dockerfile: infra/config-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
    restart: on-failure

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d stats"]
      interval: 5s
      timeout: 5s
      retries: 10

  main-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm
      POSTGRES_USER: ewm
      POSTGRES_PASSWORD: ewm
    volumes:
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewm -d ewm"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: core/user-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      main-db:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_CONFIG_DISCOVERY_SERVICE_ID: config-server
      DB_HOST: main-db
      DB_PORT: 5432
      DB_NAME: ewm
      DB_USER: ewm
      DB_PASSWORD: ewm
      SPRING_DATASOURCE_URL: jdbc:postgresql://main-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: ewm
      SPRING_DATASOURCE_PASSWORD: ewm
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: never
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps/CONFIG-SERVER >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
      - "--spring.config.import=optional:configserver:"
      - "--spring.cloud.config.discovery.enabled=true"
      - "--spring.cloud.config.discovery.service-id=config-server"
    restart: on-failure

  additional-service:
    build:
      context: .
      dockerfile: core/additional-service/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      main-db:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_CONFIG_DISCOVERY_SERVICE_ID: config-server
      DB_HOST: main-db
      DB_PORT: 5432
      DB_NAME: ewm
      DB_USER: ewm
      DB_PASSWORD: ewm
      SPRING_DATASOURCE_URL: jdbc:postgresql://main-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: ewm
      SPRING_DATASOURCE_PASSWORD: ewm
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: never
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps/CONFIG-SERVER >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
      - "--spring.config.import=optional:configserver:"
      - "--spring.cloud.config.discovery.enabled=true"
      - "--spring.cloud.config.discovery.service-id=config-server"
    restart: on-failure

  stats-server:
    build:
      context: .
      dockerfile: ewm-stats-service/stats-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      stats-db:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_CONFIG_DISCOVERY_SERVICE_ID: config-server
      DB_HOST: stats-db
      DB_PORT: 5432
      DB_NAME: stats
      DB_USER: stats
      DB_PASSWORD: stats
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: stats
      SPRING_DATASOURCE_PASSWORD: stats
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:schema.sql
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps/CONFIG-SERVER >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
      - "--spring.config.import=optional:configserver:"
      - "--spring.cloud.config.discovery.enabled=true"
      - "--spring.cloud.config.discovery.service-id=config-server"
    restart: on-failure

  main-server:
    build:
      context: .
      dockerfile: core/ewm-main-service/main-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      stats-server:
        condition: service_started
      user-service:
        condition: service_started
      additional-service:
        condition: service_started
      main-db:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_CONFIG_DISCOVERY_SERVICE_ID: config-server
      DB_HOST: main-db
      DB_PORT: 5432
      DB_NAME: ewm
      DB_USER: ewm
      DB_PASSWORD: ewm
      SPRING_DATASOURCE_URL: jdbc:postgresql://main-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: ewm
      SPRING_DATASOURCE_PASSWORD: ewm
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:schema.sql
      EWM_USERS_LOOKUP_MODE: feign
      EWM_CATEGORIES_LOOKUP_MODE: feign
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps/CONFIG-SERVER >/dev/null; do sleep 2; done; until curl -fsS http://discovery-server:8761/eureka/apps/STATS-SERVER >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
      - "--spring.config.import=optional:configserver:"
      - "--spring.cloud.config.discovery.enabled=true"
      - "--spring.cloud.config.discovery.service-id=config-server"
    restart: on-failure

  gateway-server:
    build:
      context: .
      dockerfile: infra/gateway-server/Dockerfile
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      user-service:
        condition: service_started
      additional-service:
        condition: service_started
      main-server:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED: "true"
      SPRING_CLOUD_CONFIG_DISCOVERY_SERVICE_ID: config-server
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "until curl -fsS http://discovery-server:8761/eureka/apps/CONFIG-SERVER >/dev/null; do sleep 2; done; until curl -fsS http://discovery-server:8761/eureka/apps/MAIN-SERVER >/dev/null; do sleep 2; done; exec java -jar app.jar \"$@\""
      - "java"
    command:
      - "--eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/"
      - "--eureka.instance.prefer-ip-address=true"
      - "--spring.config.import=optional:configserver:"
      - "--spring.cloud.config.discovery.enabled=true"
      - "--spring.cloud.config.discovery.service-id=config-server"
    restart: on-failure
