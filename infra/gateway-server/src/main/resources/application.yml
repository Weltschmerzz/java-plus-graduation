spring:
  application:
    name: gateway-server
  config:
    import: "optional:configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
    gateway:
      routes:
        - id: user-admin
          uri: lb://user-service
          predicates:
            - Path=/admin/users,/admin/users/**
        - id: additional-admin-categories
          uri: lb://additional-service
          predicates:
            - Path=/admin/categories,/admin/categories/**
        - id: additional-admin-locations
          uri: lb://additional-service
          predicates:
            - Path=/admin/locations,/admin/locations/**
        - id: main-admin
          uri: lb://main-server
          predicates:
            - Path=/admin/**
        - id: main-users
          uri: lb://main-server
          predicates:
            - Path=/users/**
        - id: main-events
          uri: lb://main-server
          predicates:
            - Path=/events/**
        - id: additional-categories
          uri: lb://additional-service
          predicates:
            - Path=/categories,/categories/**
        - id: main-compilations
          uri: lb://main-server
          predicates:
            - Path=/compilations/**
        - id: additional-locations
          uri: lb://additional-service
          predicates:
            - Path=/locations,/locations/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
