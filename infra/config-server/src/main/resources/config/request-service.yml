spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ewm}
    username: ${DB_USER:${POSTGRES_USER:ewm}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:ewm}}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

ewm:
  request-service:
    users:
      lookup:
        mode: feign
  events:
    lookup:
      mode: feign

logging:
  level:
    org.springframework.orm.jpa: INFO
    org.springframework.transaction: INFO
